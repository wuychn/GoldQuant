# ============================================================================
# GoldQuant 规则引擎配置
# ============================================================================
# 每条规则可单独启用(true)/禁用(false)
# 未列出的规则默认启用
# 阈值参数可直接修改，无需改代码
# ============================================================================

# --------------------------------------------------------------------------
# 全局前置条件
# 这些规则在所有模式下最先执行，任何一条 FAIL 都会在推送中标注风险提示
# --------------------------------------------------------------------------
global_preconditions:
  # 市场状态机判定（6指标综合评分: 强势/震荡/弱势）
  MarketStateDetermination:
    enabled: true
    params:
      # 6项指标各自权重（总和不限定，按比例计算）
      # 指标: 涨跌比、涨停跌停比、成交量变化、主力资金、情绪温度、板块轮动
      weak_threshold: 2        # 总分<=此值判定为弱势
      strong_threshold: 4      # 总分>=此值判定为强势

  # 情绪退潮预警（连续缩量或跌停增加时触发）
  SentimentDecayWarning:
    enabled: true
    params:
      volume_decay_days: 3     # 连续缩量天数触发预警
      limit_down_surge: 2.0    # 跌停数较前日倍增触发预警

  # 极端行情熔断（大盘单日跌幅超阈值，禁止新开仓）
  ExtremeMarketCircuitBreaker:
    enabled: true
    params:
      index_drop_pct: -3.0     # 大盘跌幅低于此值触发熔断(%)

  # 每日亏损限额（当日已实现亏损超限则禁止新开仓）
  DailyLossLimit:
    enabled: true
    params:
      max_daily_loss_pct: -3.0 # 当日最大允许亏损占总资金比(%)

# --------------------------------------------------------------------------
# 仓位管理
# 跨策略共用的仓位规则
# --------------------------------------------------------------------------
position:
  # 仓位上限联动（根据市场状态动态调整最大仓位）
  PositionLimit:
    enabled: true
    params:
      max_positions_strong: 3  # 强势市场最多持仓数
      max_positions_neutral: 2 # 震荡市场最多持仓数
      max_positions_weak: 1    # 弱势市场最多持仓数

# --------------------------------------------------------------------------
# 共用约束
# --------------------------------------------------------------------------
common:
  # 标的池过滤（排除ST、科创板、北交所、次新股等）
  StockPoolFilter:
    enabled: true
    params:
      exclude_st: true         # 排除ST/*ST
      exclude_kcb: true        # 排除科创板(688)
      exclude_bse: true        # 排除北交所(8/4开头)
      min_listing_days: 60     # 最少上市天数

  # 止损冷却期（近N日内止损过的标的禁止买入）
  StopLossCooling:
    enabled: true
    params:
      cooling_days: 5          # 止损后冷却天数

# --------------------------------------------------------------------------
# 涨停板战法 - 加自选
# 从人气榜中筛选符合涨停板战法的标的加入自选
# --------------------------------------------------------------------------
zt_watchlist:
  # 人气排名要求
  ZTPopularity:
    enabled: true
    params:
      max_rank: 20             # 人气排名需在前N名

  # 市值限制
  ZTMarketCap:
    enabled: false
    params:
      min_cap_yi: 50           # 最低流通市值(亿)
      max_cap_yi: 1000         # 最高流通市值(亿)

  # 连板情况
  ZTConsecutiveBoards:
    enabled: true
    params:
      min_boards: 2            # 最少连板数（含首板则设1）
      max_boards: 7            # 最多连板数（过高风险大）

  # 概念共振（所属概念是否有板块效应）
  ZTConceptResonance:
    enabled: false
    params:
      min_resonance_stocks: 3  # 同概念涨停股数>=此值视为共振

# --------------------------------------------------------------------------
# 涨停板战法 - 盘前买入
# 对自选中涨停板战法标的进行盘前竞价阶段筛选
# --------------------------------------------------------------------------
zt_buy_pre:
  # 高开幅度要求
  ZTHighOpen:
    enabled: true
    params:
      min_open_pct: 1.0        # 最低高开幅度(%)
      max_open_pct: 5.0        # 最高高开幅度(%)，过高追高风险

  # 竞价量比
  ZTVolumeRatioPre:
    enabled: true
    params:
      min_volume_ratio: 1.5    # 竞价量比最低要求

  # 非一字板（一字涨停无法买入，需排除）
  ZTNotOneBoard:
    enabled: true

  # 集合竞价成交额
  ZTAuctionVolume:
    enabled: true
    params:
      min_auction_amount_wan: 3000  # 集合竞价最低成交额(万元)

# --------------------------------------------------------------------------
# 涨停板战法 - 盘中买入
# 盘中实时监控，符合条件的标的触发买入信号
# --------------------------------------------------------------------------
zt_buy_intraday:
  # 盘中人气保持
  ZTIntradayPopularity:
    enabled: true
    params:
      max_rank: 30             # 盘中人气排名需在前N名

  # 概念板块活跃
  ZTIntradayConcept:
    enabled: true
    params:
      min_concept_gain_pct: 1.0  # 所属概念板块涨幅需>此值(%)

  # 股价在均线上方
  ZTAboveAvgPrice:
    enabled: true
    params:
      reference_ma: 5          # 参考均线周期(日)

  # 涨幅未过热
  ZTGainNotOverheated:
    enabled: true
    params:
      max_gain_pct: 7.0        # 当日涨幅上限(%)，超过则追高风险大

# --------------------------------------------------------------------------
# 涨停板战法 - 持股监控
# 持有涨停板战法标的时的风险监控指标
# --------------------------------------------------------------------------
zt_hold:
  # 股价保持在均价线上方
  ZTAboveAvgHold:
    enabled: true

  # 大单持续流出预警
  ZTWeaknessOutflow:
    enabled: true
    params:
      outflow_threshold_wan: -5000  # 大单净流出超此值触发预警(万)

  # 盈利回撤预警
  ZTProfitPullback:
    enabled: true
    params:
      pullback_from_high_pct: -5.0  # 从最高盈利回撤超此值触发预警(%)

# --------------------------------------------------------------------------
# 涨停板战法 - 卖出
# 触发任一卖出条件即建议卖出
# --------------------------------------------------------------------------
zt_sell:
  # 开盘形态卖出（低开或平开弱势直接卖出）
  ZTOpenPatternSell:
    enabled: true
    params:
      low_open_pct: -1.0       # 开盘跌幅低于此值触发(%)

  # ATR止损（基于波动率的动态止损）
  ZTATRStopLoss:
    enabled: true
    params:
      atr_multiplier: 2.0      # ATR倍数止损线

  # 时间止损（持仓超时未盈利则卖出）
  ZTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 3         # 最大持仓天数

# --------------------------------------------------------------------------
# 龙回头战法 - 加自选
# 从人气榜中筛选符合龙回头形态的标的
# --------------------------------------------------------------------------
lht_watchlist:
  # 人气排名（龙回头需要有过高人气的历史）
  LHTPopularity:
    enabled: true
    params:
      max_rank: 100            # 历史最高排名需在前N名

  # 近期有涨停历史
  LHTRecentZT:
    enabled: true
    params:
      lookback_days: 10        # 回看天数
      min_zt_count: 1          # 最少涨停次数

  # 回调幅度（从高点回撤）
  LHTPullback:
    enabled: true
    params:
      min_pullback_pct: -5.0  # 最少回调幅度(%)
      max_pullback_pct: -30.0  # 最大回调幅度(%)，过深可能破位

  # 均线支撑（回调到均线附近获支撑）
  LHTMASupport:
    enabled: true
    params:
      support_ma: 20           # 支撑均线周期
      tolerance_pct: 3.0       # 允许偏离均线幅度(%)

  # 连续收阳（企稳信号）
  LHTConsecutiveUp:
    enabled: true
    params:
      min_consecutive_days: 2  # 最少连续收阳天数

  # 缩量企稳
  LHTVolume:
    enabled: true
    params:
      max_volume_ratio: 0.7    # 回调阶段量比上限（相对前期放量）

  # MACD 金叉/底背离
  LHTMACD:
    enabled: true

# --------------------------------------------------------------------------
# 龙回头战法 - 买入
# --------------------------------------------------------------------------
lht_buy:
  # 股价接近均线
  LHTPriceNearMA:
    enabled: true
    params:
      target_ma: 10            # 目标均线周期
      max_deviation_pct: 3.0   # 允许偏离均线最大幅度(%)

  # 买入时间限制（避免早盘冲动）
  LHTTimeAfter10:
    enabled: true
    params:
      earliest_hour: 10        # 最早买入时间(时)
      earliest_minute: 0       # 最早买入时间(分)

  # 分时量比确认
  LHTVolumeRatio:
    enabled: true
    params:
      min_volume_ratio: 1.2    # 买入时量比需>此值（放量确认）

  # 主力资金流入
  LHTMainCapitalInflow:
    enabled: true
    params:
      min_inflow_wan: 1000     # 主力净流入最低要求(万)

# --------------------------------------------------------------------------
# 龙回头战法 - 持股监控
# --------------------------------------------------------------------------
lht_hold:
  # 股价保持在MA5上方
  LHTAboveMA5:
    enabled: true

  # 均线破位预警
  LHTMABreakdown:
    enabled: true
    params:
      breakdown_ma: 10         # 跌破此均线触发预警

  # 资金持续流出
  LHTCapitalOutflow:
    enabled: true
    params:
      outflow_days: 3          # 连续流出天数触发预警

  # 反弹后再回落
  LHTReboundPullback:
    enabled: true
    params:
      rebound_pullback_pct: -3.0  # 反弹后回落幅度触发预警(%)

# --------------------------------------------------------------------------
# 龙回头战法 - 卖出
# --------------------------------------------------------------------------
lht_sell:
  # 盈利目标（达到目标盈利止盈）
  LHTProfitTarget:
    enabled: true
    params:
      target_profit_pct: 15.0  # 目标盈利百分比(%)

  # 均线止损（跌破关键均线卖出）
  LHTMAStopLoss:
    enabled: true
    params:
      stoploss_ma: 20          # 跌破此均线止损
      tolerance_pct: 1.0       # 允许短暂假破(%)

  # 时间止损
  LHTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 10        # 最大持仓天数
