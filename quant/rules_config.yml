# ============================================================================
# GoldQuant 规则引擎配置
# ============================================================================
# 每条规则可单独启用(true)/禁用(false)
# 未列出的规则默认启用
# 阈值参数可直接修改，无需改代码
# ============================================================================

# --------------------------------------------------------------------------
# 程序化交易时段（实盘：须为真实交易日 + 沪深连续竞价；回测可调 off）
# - time_validation_enabled：主开关（未配置时回退 legacy 键 enforce_real_workday）
# --------------------------------------------------------------------------
trading:
  # true：启用「时间校验」——须 is_real_workday_cn 且北京时间连续竞价时段
  # false：不限制时间与交易日（便于回测；规则链仍可照常评估）
  time_validation_enabled: false
  enforce_real_workday: false  # legacy 兼容别名；仅当未写 time_validation_enabled 时使用

# 「回避高开低走弱势」默认参数（zt_buy_intraday / lht_buy / zsll_buy 通过 YAML 合并引用；单链可写 params 覆盖任意键）
_no_buy_weak_params: &no_buy_weak_params
  enable_earliest_buy_clock: false
  earliest_buy_hour: 10
  earliest_buy_minute: 30
  enable_market_advancers_gt_decliners: false
  enable_min_change_pct: false
  min_change_pct: 0.0
  enable_latest_above_avg: false
  latest_vs_avg_min_ratio: 1.0
  enable_main_net_inflow_positive: false
  enable_ma_bull_stack: false
  enable_max_upper_shadow_pct: false
  max_upper_shadow_vs_prev_pct: 4.0
  enable_min_pullback_from_high_pct: false
  min_pullback_from_high_pct: 3.0
  pullback_from_high_only_when_below_open: true
  enable_max_gap_fill_pct: false
  max_gap_fill_pct: 65.0
  enable_min_volume_ratio: false
  min_volume_ratio: 1.0
  enable_core_gap_below_open: true
  min_gap_up_pct: 0.8
  require_latest_below_open: true
  require_ma_touch_zone: false
  ma_low_ratio: 0.99
  ma_high_ratio: 1.02

# 「盘中10分钟线」当日走势过滤（zt_buy_intraday / lht_buy / zsll_buy 可 <<: 引用）
_intraday_10m_guard_params: &intraday_10m_guard_params
  enable_min_bar_count: true
  min_bar_count: 2
  enable_max_session_drawdown_pct: false
  max_session_drawdown_pct: 12.0
  enable_last_n_bars_bearish: false
  last_n_bars: 4
  min_bearish_bars: 3
  enable_min_session_gain_from_first_open_pct: false
  min_session_gain_from_first_open_pct: -1.5
  enable_last_vs_mean_close_ratio: false
  min_last_vs_mean_close_ratio: 0.998

# --------------------------------------------------------------------------
# 全局前置条件
# 这些规则在所有模式下最先执行，任何一条 FAIL 都会在推送中标注风险提示
# --------------------------------------------------------------------------
global_preconditions:
  # 市场状态机判定（6指标综合评分: 强势/震荡/弱势）
  MarketStateDetermination:
    enabled: true
    params:
      # 软评分：6 项各投强势/震荡/弱势一票后计数（见 quant/rules/market_state.py）
      weak_threshold: 2        # 弱势票≥weak_threshold+1 时判弱势
      strong_threshold: 4      # 强势票≥此值时先判强势，再验硬门槛
      # 判「强势」硬条件（须同时满足；任一不满足则从强势降为震荡）
      strong_gate_index_min: 0.5   # 上证涨跌幅≥此值(%)；数据来自大盘指数/市场状态机
      strong_gate_zt_min: 50        # 涨停家数≥；须 JSON「赚钱效应.涨停」
      strong_gate_dt_max: 30       # 跌停家数≤；须 JSON「赚钱效应.跌停」
      # 硬条件另须：上涨家数>下跌家数（赚钱效应「上涨」「下跌」）

  # 情绪退潮预警（阈值见 common.SentimentDecayWarning；此处可单独覆盖全局前置里的该规则）
  SentimentDecayWarning:
    enabled: true
    params:
      volume_decay_days: 3     # 预留：evaluate 暂未使用
      limit_down_surge: 2.0    # 预留：evaluate 暂未使用
      min_yesterday_zt_avg_pct: 0.0   # 不填则与其它链同上 common 默认值

  # 极端行情熔断（大盘单日跌幅超阈值，禁止新开仓）
  ExtremeMarketCircuitBreaker:
    enabled: true
    params:
      index_drop_pct: -3.0     # 大盘跌幅低于此值触发熔断(%)

  # 每日亏损限额（当日已实现亏损超限则禁止新开仓）
  DailyLossLimit:
    enabled: true
    params:
      max_daily_loss_pct: -3.0 # 当日最大允许亏损占总资金比(%)

# --------------------------------------------------------------------------
# 仓位管理
# 跨策略共用的仓位规则
# --------------------------------------------------------------------------
position:
  # 仓位上限联动（根据市场状态动态调整最大仓位）
  PositionLimit:
    enabled: true
    params:
      max_positions_strong: 5  # 强势市场最多持仓数
      max_positions_neutral: 3 # 震荡市场最多持仓数
      max_positions_weak: 1    # 弱势市场最多持仓数

# --------------------------------------------------------------------------
# 共用约束
# --------------------------------------------------------------------------
common:
  # 情绪退潮：沿用一条门槛（并入所有含「情绪退潮预警」的规则链）。
  SentimentDecayWarning:
    enabled: true
    params:
      # 昨日涨停表现涨跌幅均值（%）须 ≥ 此值，否则整条链 Fail；默认等价于原先的「≥0%」。
      min_yesterday_zt_avg_pct: 0.0

  # 标的池过滤（排除ST、科创板、北交所、次新股等）
  StockPoolFilter:
    enabled: true
    params:
      exclude_st: true         # 排除ST/*ST
      exclude_kcb: true        # 排除科创板(688)
      exclude_bse: true        # 排除北交所(8/4开头)
      min_listing_days: 60     # 最少上市天数

  # 止损冷却期（近N日内止损过的标的禁止买入）
  StopLossCooling:
    enabled: true
    params:
      cooling_days: 3          # 止损后冷却天数

# --------------------------------------------------------------------------
# 涨停板战法 - 加自选（主打连板强势接力；连板上下限见 ZTConsecutiveBoards）
# --------------------------------------------------------------------------
zt_watchlist:
  # 情绪退潮时（见 SentimentDecayWarning 实现）不加涨停板战法自选
  SentimentDecayWarning:
    enabled: true

  # 市场炸板率门禁（赚钱效应近似口径）：(涨停−真实涨停)/涨停
  ZTMarketBlastRateGate:
    enabled: true
    params:
      max_market_blast_rate_pct: 52.0

  # 人气排名要求
  ZTPopularity:
    enabled: true
    params:
      max_rank: 20             # 人气排名需在前N名

  # 市值限制
  ZTMarketCap:
    enabled: false
    params:
      min_cap_yi: 50           # 最低流通市值(亿)
      max_cap_yi: 1000         # 最高流通市值(亿)

  # 连板情况（连板高度上下限；标的池已排除 ST/科创/北交所/次新股）
  ZTConsecutiveBoards:
    enabled: true
    params:
      min_boards: 2            # 最少连板数（含首板则设1）
      max_boards: 7            # 最多连板数（过高风险大）

  # 非一字板（一字涨停通常无法接力买入）
  ZTWatchlistNotOneBoard:
    enabled: true
    params:
      open_limit_epsilon: 0.002

  # 概念共振（所属概念是否有板块效应）
  ZTConceptResonance:
    enabled: false
    params:
      min_resonance_stocks: 3  # 同概念涨停股数>=此值视为共振

# --------------------------------------------------------------------------
# 涨停板战法 - 盘前买入
# 对自选中涨停板战法标的进行盘前竞价阶段筛选
# --------------------------------------------------------------------------
zt_buy_pre:
  # 情绪退潮时不开涨停板战法新仓
  SentimentDecayWarning:
    enabled: true

  # 高开幅度要求
  ZTHighOpen:
    enabled: true
    params:
      min_open_pct: 1.0        # 最低高开幅度(%)
      max_open_pct: 7.0        # 最高高开幅度(%)，过高追高风险

  # 竞价量比
  ZTVolumeRatioPre:
    enabled: true
    params:
      min_volume_ratio: 1.5    # 竞价量比最低要求

  # 非一字板（一字涨停无法买入，需排除）
  ZTNotOneBoard:
    enabled: true

  # 集合竞价成交额
  ZTAuctionVolume:
    enabled: false
    params:
      min_auction_amount_wan: 3000  # 集合竞价最低成交额(万元)

# --------------------------------------------------------------------------
# 涨停板战法 - 盘中买入
# 盘中实时监控，符合条件的标的触发买入信号
# --------------------------------------------------------------------------
zt_buy_intraday:
  NoBuyGapUpWeakIntraday:
    enabled: true
    params:
      <<: *no_buy_weak_params

  Intraday10mTrendGuard:
    enabled: true
    params:
      <<: *intraday_10m_guard_params

  # 情绪退潮时不开涨停板战法新仓
  SentimentDecayWarning:
    enabled: true

  # 盘中人气保持
  ZTIntradayPopularity:
    enabled: true
    params:
      max_rank: 20             # 盘中人气排名需在前N名

  # 概念板块活跃
  ZTIntradayConcept:
    enabled: true
    params:
      min_concept_gain_pct: 1.0  # 所属概念板块涨幅需>此值(%)

  # 股价在均线上方
  ZTAboveAvgPrice:
    enabled: true
    params:
      reference_ma: 5          # 参考均线周期(日)

  # 涨幅未过热
  ZTGainNotOverheated:
    enabled: true
    params:
      max_gain_pct: 7.0        # 当日涨幅上限(%)，超过则追高风险大

# --------------------------------------------------------------------------
# 涨停板战法 - 持股监控
# 持有涨停板战法标的时的风险监控指标
# --------------------------------------------------------------------------
zt_hold:
  # 股价保持在均价线上方
  ZTAboveAvgHold:
    enabled: true

  # 大单持续流出预警
  ZTWeaknessOutflow:
    enabled: false
    params:
      outflow_threshold_wan: -5000  # 大单净流出超此值触发预警(万)

  # 盈利回撤预警
  ZTProfitPullback:
    enabled: true
    params:
      pullback_from_high_pct: -5.0  # 从最高盈利回撤超此值触发预警(%)

# --------------------------------------------------------------------------
# 涨停板战法 - 卖出
# 触发任一卖出条件即建议卖出
# --------------------------------------------------------------------------
zt_sell:
  # 开盘形态卖出（低开或平开弱势直接卖出）
  ZTOpenPatternSell:
    enabled: true
    params:
      low_open_pct: -3.0       # 开盘跌幅低于此值触发(%)

  # ATR止损（基于波动率的动态止损）
  ZTATRStopLoss:
    enabled: true
    params:
      atr_multiplier: 2.0      # ATR倍数止损线

  # 时间止损（持仓超时未盈利则卖出）
  ZTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 5         # 最大持仓天数

# --------------------------------------------------------------------------
# 龙回头战法 - 加自选（连板收尾后固定观察日内：急跌+急涨；阴跌 / 有效跌破 MA20 否决）
# --------------------------------------------------------------------------
lht_watchlist:
  LHTPopularity:
    enabled: true
    params:
      max_rank: 100

  LHTDragonReturnWatchlist:
    enabled: true
    params:
      lookback_days: 120                         # 连板段须在近期窗口内收尾
      observation_days: 30                       # T0（连板收尾后首日非涨停）起算的交易日上限
      min_zt_run_days: 5                         # 至少 N 连板（非一字可配）
      main_board_zt_pct: 9.8
      cyb_zt_pct: 19.8
      exclude_one_word_from_zt_run: true        # 连板计数剔除一字近似板
      one_word_amp_pct_max: 0.12               # 「一字近似」振幅阈值(%，相对昨收)
      sharp_down_pct: 7.0                       # 急跌阈值（较前收单日跌幅≤−该值）
      sharp_up_pct: 7.0                         # 急涨阈值（较前收单日涨幅≥该值）
      yin_die_min_consecutive_bearish_bars: 4    # 连续阴线≥此视为阴跌环境
      ma_window: 20                             # 有效破位均线窗口
      effective_break_below_ma_consecutive_days: 2  # 连续 N 日收盘低于当期 MA ⇒ 破位

# --------------------------------------------------------------------------
# 龙回头战法 - 买入
# --------------------------------------------------------------------------
lht_buy:
  # 显著高开但已跌破今开：回避「高开低走」接均线弱势盘（见 NoBuyGapUpWeakIntradayRule）
  NoBuyGapUpWeakIntraday:
    enabled: true
    params:
      <<: *no_buy_weak_params

  Intraday10mTrendGuard:
    enabled: true
    params:
      <<: *intraday_10m_guard_params

  # 股价接近均线
  LHTPriceNearMA:
    enabled: true
    params:
      target_ma: 10            # 目标均线周期
      max_deviation_pct: 3.0   # 允许偏离均线最大幅度(%)

  # 买入时间限制（避免早盘冲动）
  LHTTimeAfter10:
    enabled: true
    params:
      earliest_hour: 10        # 最早买入时间(时)
      earliest_minute: 0       # 最早买入时间(分)

  # 分时量比确认
  LHTVolumeRatio:
    enabled: true
    params:
      min_volume_ratio: 1.2    # 买入时量比需>此值（放量确认）

  # 主力资金流入
  LHTMainCapitalInflow:
    enabled: true
    params:
      min_inflow_wan: 1000     # 主力净流入最低要求(万)

# --------------------------------------------------------------------------
# 龙回头战法 - 持股监控
# --------------------------------------------------------------------------
lht_hold:
  # 股价保持在MA5上方
  LHTAboveMA5:
    enabled: true

  # 均线破位预警
  LHTMABreakdown:
    enabled: true
    params:
      breakdown_ma: 10         # 跌破此均线触发预警

  # 资金持续流出
  LHTCapitalOutflow:
    enabled: true
    params:
      outflow_days: 3          # 连续流出天数触发预警

  # 反弹后再回落
  LHTReboundPullback:
    enabled: true
    params:
      rebound_pullback_pct: -3.0  # 反弹后回落幅度触发预警(%)

# --------------------------------------------------------------------------
# 龙回头战法 - 卖出
# --------------------------------------------------------------------------
lht_sell:
  # 盈利目标（达到目标盈利止盈）
  LHTProfitTarget:
    enabled: true
    params:
      target_profit_pct: 15.0  # 目标盈利百分比(%)

  # 均线止损（跌破 MA20 且连续多日确认——见下方参数）
  LHTMAStopLoss:
    enabled: true
    params:
      stoploss_ma: 20          # MA 周期
      tolerance_pct: 0.8       # 收盘低于 MA*(1−tolerance%) 计入『破位』缓冲
      confirm_days_below_ma: 2 # 尾部连续多日确认后才触发卖出

  # 时间止损
  LHTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 10        # 最大持仓天数

# --------------------------------------------------------------------------
# 主升浪战法 - 加自选（主打中长期趋势与结构）
# --------------------------------------------------------------------------
zsll_watchlist:
  ZSLPopularity:
    enabled: true
    params:
      max_rank: 80

  # 近 ref_days 根 K 线累计涨幅
  ZSLTrendGain:
    enabled: true
    params:
      ref_days: 15
      min_gain_pct: 5.0

  # 均线多头 + 收盘相对 MA5/MA20
  ZSLMaLongTrend:
    enabled: true
    params:
      require_full_stack: true
      ma5_floor_ratio: 0.98
      ma20_floor_ratio: 1.0

  # 窗口内自高点最大回撤上限（非深调第二波语义）
  ZSLWindowMaxDrawdown:
    enabled: true
    params:
      lookback_days: 60
      max_drawdown_from_high_pct: 35.0

  # 收阳日占比
  ZSLPositiveDaysRatio:
    enabled: true
    params:
      window_days: 15
      min_positive_ratio: 0.52

  ZSLVolumeThrust:
    enabled: true
    params:
      min_ratio: 0.9
      max_ratio: 5.0

  ZSLMACD:
    enabled: true

# --------------------------------------------------------------------------
# 主升浪战法 - 买入
# --------------------------------------------------------------------------
zsll_buy:
  NoBuyGapUpWeakIntraday:
    enabled: true
    params:
      <<: *no_buy_weak_params

  Intraday10mTrendGuard:
    enabled: true
    params:
      <<: *intraday_10m_guard_params

  ZSLPriceRidingMA:
    enabled: true
    params:
      ma5_low_ratio: 0.99
      ma5_high_ratio: 1.06
      ma10_low_ratio: 0.99
      ma10_high_ratio: 1.03
      ma20_low_ratio: 0.99
      ma20_high_ratio: 1.03

  ZSLTimeAfter10:
    enabled: true
    params:
      earliest_hour: 10
      earliest_minute: 0

  ZSLVolumeRatio:
    enabled: true
    params:
      min_ratio: 1.0
      max_ratio: 3.5

  ZSLMainCapitalInflow:
    enabled: true

# --------------------------------------------------------------------------
# 主升浪战法 - 持股监控
# --------------------------------------------------------------------------
zsll_hold:
  ZSLAboveMA5:
    enabled: true

  ZSLMABreakdown:
    enabled: true
    params:
      breakdown_ratio: 0.98

  ZSLCapitalOutflow:
    enabled: true

  ZSLReboundPullback:
    enabled: true
    params:
      pullback_pct: 3.0

# --------------------------------------------------------------------------
# 主升浪战法 - 卖出
# --------------------------------------------------------------------------
zsll_sell:
  ZSLProfitTarget:
    enabled: true

  ZSLMAStopLoss:
    enabled: true
    params:
      stop_ratio: 0.98

  ZSLTimeStopLoss:
    enabled: true
    params:
      max_days: 5
      min_gain_pct: 5.0
