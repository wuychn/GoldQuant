# ============================================================================
# GoldQuant 规则引擎配置
# ============================================================================
# 每条规则可单独启用(true)/禁用(false)
# 未列出的规则默认启用
# 阈值参数可直接修改，无需改代码
# ============================================================================

# --------------------------------------------------------------------------
# 全局前置条件
# 这些规则在所有模式下最先执行，任何一条 FAIL 都会在推送中标注风险提示
# --------------------------------------------------------------------------
global_preconditions:
  # 市场状态机判定（6指标综合评分: 强势/震荡/弱势）
  MarketStateDetermination:
    enabled: true
    params:
      # 6项指标各自权重（总和不限定，按比例计算）
      # 指标: 涨跌比、涨停跌停比、成交量变化、主力资金、情绪温度、板块轮动
      weak_threshold: 2        # 总分<=此值判定为弱势
      strong_threshold: 4      # 总分>=此值判定为强势

  # 情绪退潮预警（连续缩量或跌停增加时触发）
  SentimentDecayWarning:
    enabled: true
    params:
      volume_decay_days: 3     # 连续缩量天数触发预警
      limit_down_surge: 2.0    # 跌停数较前日倍增触发预警

  # 极端行情熔断（大盘单日跌幅超阈值，禁止新开仓）
  ExtremeMarketCircuitBreaker:
    enabled: true
    params:
      index_drop_pct: -3.0     # 大盘跌幅低于此值触发熔断(%)

  # 每日亏损限额（当日已实现亏损超限则禁止新开仓）
  DailyLossLimit:
    enabled: true
    params:
      max_daily_loss_pct: -3.0 # 当日最大允许亏损占总资金比(%)

# --------------------------------------------------------------------------
# 仓位管理
# 跨策略共用的仓位规则
# --------------------------------------------------------------------------
position:
  # 仓位上限联动（根据市场状态动态调整最大仓位）
  PositionLimit:
    enabled: true
    params:
      max_positions_strong: 5  # 强势市场最多持仓数
      max_positions_neutral: 3 # 震荡市场最多持仓数
      max_positions_weak: 1    # 弱势市场最多持仓数

# --------------------------------------------------------------------------
# 共用约束
# --------------------------------------------------------------------------
common:
  # 标的池过滤（排除ST、科创板、北交所、次新股等）
  StockPoolFilter:
    enabled: true
    params:
      exclude_st: true         # 排除ST/*ST
      exclude_kcb: true        # 排除科创板(688)
      exclude_bse: true        # 排除北交所(8/4开头)
      min_listing_days: 60     # 最少上市天数

  # 止损冷却期（近N日内止损过的标的禁止买入）
  StopLossCooling:
    enabled: true
    params:
      cooling_days: 3          # 止损后冷却天数

# --------------------------------------------------------------------------
# 涨停板战法 - 加自选（主打连板强势接力；连板上下限见 ZTConsecutiveBoards）
# --------------------------------------------------------------------------
zt_watchlist:
  # 人气排名要求
  ZTPopularity:
    enabled: true
    params:
      max_rank: 20             # 人气排名需在前N名

  # 市值限制
  ZTMarketCap:
    enabled: false
    params:
      min_cap_yi: 50           # 最低流通市值(亿)
      max_cap_yi: 1000         # 最高流通市值(亿)

  # 连板情况
  ZTConsecutiveBoards:
    enabled: true
    params:
      min_boards: 2            # 最少连板数（含首板则设1）
      max_boards: 7            # 最多连板数（过高风险大）

  # 概念共振（所属概念是否有板块效应）
  ZTConceptResonance:
    enabled: false
    params:
      min_resonance_stocks: 3  # 同概念涨停股数>=此值视为共振

# --------------------------------------------------------------------------
# 涨停板战法 - 盘前买入
# 对自选中涨停板战法标的进行盘前竞价阶段筛选
# --------------------------------------------------------------------------
zt_buy_pre:
  # 高开幅度要求
  ZTHighOpen:
    enabled: true
    params:
      min_open_pct: 1.0        # 最低高开幅度(%)
      max_open_pct: 7.0        # 最高高开幅度(%)，过高追高风险

  # 竞价量比
  ZTVolumeRatioPre:
    enabled: true
    params:
      min_volume_ratio: 1.5    # 竞价量比最低要求

  # 非一字板（一字涨停无法买入，需排除）
  ZTNotOneBoard:
    enabled: true

  # 集合竞价成交额
  ZTAuctionVolume:
    enabled: false
    params:
      min_auction_amount_wan: 3000  # 集合竞价最低成交额(万元)

# --------------------------------------------------------------------------
# 涨停板战法 - 盘中买入
# 盘中实时监控，符合条件的标的触发买入信号
# --------------------------------------------------------------------------
zt_buy_intraday:
  # 盘中人气保持
  ZTIntradayPopularity:
    enabled: true
    params:
      max_rank: 20             # 盘中人气排名需在前N名

  # 概念板块活跃
  ZTIntradayConcept:
    enabled: true
    params:
      min_concept_gain_pct: 1.0  # 所属概念板块涨幅需>此值(%)

  # 股价在均线上方
  ZTAboveAvgPrice:
    enabled: true
    params:
      reference_ma: 5          # 参考均线周期(日)

  # 涨幅未过热
  ZTGainNotOverheated:
    enabled: true
    params:
      max_gain_pct: 7.0        # 当日涨幅上限(%)，超过则追高风险大

# --------------------------------------------------------------------------
# 涨停板战法 - 持股监控
# 持有涨停板战法标的时的风险监控指标
# --------------------------------------------------------------------------
zt_hold:
  # 股价保持在均价线上方
  ZTAboveAvgHold:
    enabled: true

  # 大单持续流出预警
  ZTWeaknessOutflow:
    enabled: false
    params:
      outflow_threshold_wan: -5000  # 大单净流出超此值触发预警(万)

  # 盈利回撤预警
  ZTProfitPullback:
    enabled: true
    params:
      pullback_from_high_pct: -5.0  # 从最高盈利回撤超此值触发预警(%)

# --------------------------------------------------------------------------
# 涨停板战法 - 卖出
# 触发任一卖出条件即建议卖出
# --------------------------------------------------------------------------
zt_sell:
  # 开盘形态卖出（低开或平开弱势直接卖出）
  ZTOpenPatternSell:
    enabled: true
    params:
      low_open_pct: -3.0       # 开盘跌幅低于此值触发(%)

  # ATR止损（基于波动率的动态止损）
  ZTATRStopLoss:
    enabled: true
    params:
      atr_multiplier: 2.0      # ATR倍数止损线

  # 时间止损（持仓超时未盈利则卖出）
  ZTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 5         # 最大持仓天数

# --------------------------------------------------------------------------
# 龙回头战法 - 加自选（第二波：前期连板辨识度 + 深调企稳）
# --------------------------------------------------------------------------
lht_watchlist:
  LHTPopularity:
    enabled: true
    params:
      max_rank: 100

  # 回看窗口内「连续涨停」最大天数（日线涨跌幅达到涨停阈值）
  LHTMaxConsecutiveZTRun:
    enabled: true
    params:
      lookback_days: 15
      min_consecutive_zt_days: 2   # 至少连续 N 个涨停日，刻画前期龙头
      main_board_zt_pct: 9.8
      cyb_zt_pct: 19.8

  # 从阶段高点回落（深调）
  LHTPullback:
    enabled: true
    params:
      min_pullback_pct: 10.0      # 最小回落幅度(%)，与主升浪阶段回撤上限配合使用
      lookback_days: 30

  # 回踩均线企稳区间 + 多头结构
  LHTMASupport:
    enabled: true
    params:
      ma_low_ratio: 0.98
      ma_high_ratio: 1.10
      require_ma5_ge_ma10: false  # true 时要求 MA5≥MA10≥MA20 严格多头排列

  LHTConsecutiveUp:
    enabled: true
    params:
      min_consecutive_days: 2

  LHTVolume:
    enabled: true
    params:
      min_ratio: 1.0
      max_ratio: 3.0

  LHTMACD:
    enabled: true

# --------------------------------------------------------------------------
# 龙回头战法 - 买入
# --------------------------------------------------------------------------
lht_buy:
  # 股价接近均线
  LHTPriceNearMA:
    enabled: true
    params:
      target_ma: 10            # 目标均线周期
      max_deviation_pct: 3.0   # 允许偏离均线最大幅度(%)

  # 买入时间限制（避免早盘冲动）
  LHTTimeAfter10:
    enabled: true
    params:
      earliest_hour: 10        # 最早买入时间(时)
      earliest_minute: 0       # 最早买入时间(分)

  # 分时量比确认
  LHTVolumeRatio:
    enabled: true
    params:
      min_volume_ratio: 1.2    # 买入时量比需>此值（放量确认）

  # 主力资金流入
  LHTMainCapitalInflow:
    enabled: true
    params:
      min_inflow_wan: 1000     # 主力净流入最低要求(万)

# --------------------------------------------------------------------------
# 龙回头战法 - 持股监控
# --------------------------------------------------------------------------
lht_hold:
  # 股价保持在MA5上方
  LHTAboveMA5:
    enabled: true

  # 均线破位预警
  LHTMABreakdown:
    enabled: true
    params:
      breakdown_ma: 10         # 跌破此均线触发预警

  # 资金持续流出
  LHTCapitalOutflow:
    enabled: true
    params:
      outflow_days: 3          # 连续流出天数触发预警

  # 反弹后再回落
  LHTReboundPullback:
    enabled: true
    params:
      rebound_pullback_pct: -3.0  # 反弹后回落幅度触发预警(%)

# --------------------------------------------------------------------------
# 龙回头战法 - 卖出
# --------------------------------------------------------------------------
lht_sell:
  # 盈利目标（达到目标盈利止盈）
  LHTProfitTarget:
    enabled: true
    params:
      target_profit_pct: 15.0  # 目标盈利百分比(%)

  # 均线止损（跌破关键均线卖出）
  LHTMAStopLoss:
    enabled: true
    params:
      stoploss_ma: 20          # 跌破此均线止损
      tolerance_pct: 1.0       # 允许短暂假破(%)

  # 时间止损
  LHTTimeStopLoss:
    enabled: true
    params:
      max_hold_days: 10        # 最大持仓天数

# --------------------------------------------------------------------------
# 主升浪战法 - 加自选（主打中长期趋势与结构）
# --------------------------------------------------------------------------
zsll_watchlist:
  ZSLPopularity:
    enabled: true
    params:
      max_rank: 80

  # 近 ref_days 根 K 线累计涨幅
  ZSLTrendGain:
    enabled: true
    params:
      ref_days: 15
      min_gain_pct: 5.0

  # 均线多头 + 收盘相对 MA5/MA20
  ZSLMaLongTrend:
    enabled: true
    params:
      require_full_stack: true
      ma5_floor_ratio: 0.98
      ma20_floor_ratio: 1.0

  # 窗口内自高点最大回撤上限（非深调第二波语义）
  ZSLWindowMaxDrawdown:
    enabled: true
    params:
      lookback_days: 60
      max_drawdown_from_high_pct: 35.0

  # 收阳日占比
  ZSLPositiveDaysRatio:
    enabled: true
    params:
      window_days: 15
      min_positive_ratio: 0.52

  ZSLVolumeThrust:
    enabled: true
    params:
      min_ratio: 0.9
      max_ratio: 5.0

  ZSLMACD:
    enabled: true

# --------------------------------------------------------------------------
# 主升浪战法 - 买入
# --------------------------------------------------------------------------
zsll_buy:
  ZSLPriceRidingMA:
    enabled: true
    params:
      ma5_low_ratio: 0.99
      ma5_high_ratio: 1.06
      ma10_low_ratio: 0.99
      ma10_high_ratio: 1.03
      ma20_low_ratio: 0.99
      ma20_high_ratio: 1.03

  ZSLTimeAfter10:
    enabled: true
    params:
      earliest_hour: 10
      earliest_minute: 0

  ZSLVolumeRatio:
    enabled: true
    params:
      min_ratio: 1.0
      max_ratio: 3.5

  ZSLMainCapitalInflow:
    enabled: true

# --------------------------------------------------------------------------
# 主升浪战法 - 持股监控
# --------------------------------------------------------------------------
zsll_hold:
  ZSLAboveMA5:
    enabled: true

  ZSLMABreakdown:
    enabled: true
    params:
      breakdown_ratio: 0.98

  ZSLCapitalOutflow:
    enabled: true

  ZSLReboundPullback:
    enabled: true
    params:
      pullback_pct: 3.0

# --------------------------------------------------------------------------
# 主升浪战法 - 卖出
# --------------------------------------------------------------------------
zsll_sell:
  ZSLProfitTarget:
    enabled: true

  ZSLMAStopLoss:
    enabled: true
    params:
      stop_ratio: 0.98

  ZSLTimeStopLoss:
    enabled: true
    params:
      max_days: 5
      min_gain_pct: 5.0
